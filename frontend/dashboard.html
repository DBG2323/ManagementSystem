<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">后台管理系统</div>
        <nav>
            <a href="dashboard.html" class="nav-item active">仪表盘</a>
            <a href="table.html" class="nav-item">数据管理</a>
            <a href="settings.html" class="nav-item">系统设置</a>
            <a href="login.html" class="nav-item">退出登录</a>
        </nav>
    </div>
    <div class="main-content">
        <header>
            <span class="page-title">仪表盘</span>
            <span class="user-info">欢迎，管理员</span>
        </header>
        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">1,234</div>
                    <div class="stat-label">总用户数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">567</div>
                    <div class="stat-label">活跃用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">89</div>
                    <div class="stat-label">订单数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">¥12,345</div>
                    <div class="stat-label">总收入</div>
                </div>
            </div>
            <div class="chart-container">
                <h3>数据趋势</h3>
                <div class="chart-placeholder">
                    <div class="bar-chart">
                        <div class="bar" style="height: 60%;"><span>60%</span></div>
                        <div class="bar" style="height: 80%;"><span>80%</span></div>
                        <div class="bar" style="height: 45%;"><span>45%</span></div>
                        <div class="bar" style="height: 90%;"><span>90%</span></div>
                        <div class="bar" style="height: 70%;"><span>70%</span></div>
                        <div class="bar" style="height: 85%;"><span>85%</span></div>
                        <div class="bar" style="height: 55%;"><span>55%</span></div>
                    </div>
                    <div class="chart-labels">
                        <span>周一</span>
                        <span>周二</span>
                        <span>周三</span>
                        <span>周四</span>
                        <span>周五</span>
                        <span>周六</span>
                        <span>周日</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
